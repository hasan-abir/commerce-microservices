<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: "Open Sans", sans-serif;
        /* border: 2px solid brown; */
      }

      main {
        width: 80%;
        margin: 10rem auto;
      }

      h1,
      h2,
      h3 {
        font-weight: 600;
      }

      h1 {
        text-transform: uppercase;
        margin-bottom: 5rem;
      }

      h2 {
        margin-bottom: 2rem;
      }

      h3 {
        margin-bottom: 1rem;
      }

      section {
        margin-bottom: 5rem;
      }

      section:nth-of-type(1) {
        flex: 2;
        margin-right: 1rem;
      }
      section:nth-of-type(2) {
        flex: 1;
      }

      ul {
        margin-bottom: 1rem;
      }

      button {
        display: block;
        font-size: 1rem;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
      }

      label {
        display: inline-block;
        margin-bottom: 0.2rem;
      }

      input {
        width: 300px;
        display: block;
        border-radius: 0.5rem;
        padding: 0.5rem;
        border: 2px solid #5c6cf8;
      }

      p {
        margin-bottom: 1rem;
      }

      body {
        padding-bottom: 10rem;
        background-color: #f4f4f4;
      }

      form {
        margin-bottom: 1.5rem;
      }

      .status {
        font-size: 5rem;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Payment redirect</h1>

      <div
        x-data="{ 
          payment_intent: new URLSearchParams(window.location.search).get('payment_intent') || '',
          redirect_status: new URLSearchParams(window.location.search).get('redirect_status') || ''
      }"
      >
        <p x-text="`Payment status: ${redirect_status}`" class="status"></p>
        <p x-text="`For Payment ID: ${payment_intent}`"></p>
      </div>
    </main>
  </body>
  <script src="//unpkg.com/alpinejs" defer></script>
</html>
