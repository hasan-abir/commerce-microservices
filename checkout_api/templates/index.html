<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microservices</title>
  </head>
  <body>
    <h1>Product Order</h1>
    <div class="products"></div>
  </body>
  <script>
    const fetchProducts = fetch("/api/checkout/demo-products/");
    const productsContainer = document.querySelector(".products");

    fetchProducts
      .then((response) => {
        return response.json();
      })
      .then((body) => {
        if (body instanceof Array) {
          body.forEach((product) => {
            const acceptedAttrs = ["id", "title", "price_cents", "stock"];
            const validatedProductKeys =
              JSON.stringify(Object.keys(product)) ===
              JSON.stringify(acceptedAttrs);

            if (product instanceof Object && validatedProductKeys) {
              productsContainer.innerHTML += `
                <ul>
                  <li>${product.id}</li>
                  <li>${product.title}</li>
                  <li>${product.price_cents}</li>
                  <li>${product.stock}</li>
                </ul>
              `;
            }
          });
        }
      });
  </script>
</html>
