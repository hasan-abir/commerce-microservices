<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microservices</title>
    <style>
      body {
        padding-bottom: 10rem;
      }
    </style>
  </head>
  <body>
    <main
      x-data="{ products: [], cart: [], }"
      x-init="products = await (await fetch('/api/checkout/demo-products/')).json()"
    >
      <section>
        <h1>Product Order</h1>
        <p>Add Items to Cart</p>
        <div>
          <template x-for="product in products" :key="product.id">
            <ul
              x-data="{
              quantity: 1, 
              addToCart(product, qtty) {
                const cartItemExists = cart.map(item => item.id).includes(product.id)

                if(cartItemExists === false) {
                  this.quantity = 1
                  return cart.push({...product, quantity: qtty})
                }
              }
            }"
            >
              <li x-text="`Title: ${product.title}`"></li>
              <li x-text="`Price (in cents): ${product.price_cents}`"></li>
              <li x-text="`Stock: ${product.stock}`"></li>
              <li x-text="`Quantity: ${quantity}`"></li>
              <button @click="quantity < product.stock ? quantity += 1: null">
                Increment
              </button>
              <button @click="quantity > 1 ? quantity -= 1: null">
                Decrement
              </button>
              <button @click="addToCart(product, quantity)">Add to Cart</button>
            </ul>
          </template>
        </div>
      </section>
      <section
        x-data="{
        total: 0,
        subtotal: 0,
        tax: 0.1,
        calculateTotal() {
          this.subtotal = cart.map(item => item.price_cents * item.quantity).reduce((a, b) => a + b, 0)

          this.total = this.subtotal * this.tax + this.subtotal
        },
        contact_email: '',
        orderErrs: {},
        placeOrderStatus: 0,
        elements: null,
        placeOrder(e) {
            e.preventDefault()

            this.orderErrs = {}
            this.placeOrderStatus = 0

            const cart_items = Alpine.raw(cart.map(item => ({product_id: item.id, product_quantity: item.quantity}))) 

            fetch('/api/checkout/place-order/', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({order: {contact_email: this.contact_email}, cart_items: cart_items})
              }).then(res => {
                this.placeOrderStatus = res.status            

                return res.json()
              }).then(res => {
                if (this.placeOrderStatus >= 400) {
                  this.orderErrs = res
                } else {
                  const stripe = new Stripe('{{stripe_publishable_key}}')

                  const appearance = {
                      theme: 'stripe',
                  };
                  this.elements = stripe.elements({ appearance, clientSecret: res.clientSecret });

                  const paymentElementOptions = {
                    layout: 'accordion',
                  };

                  const paymentElement = this.elements.create('payment', paymentElementOptions);
                  paymentElement.mount('#payment-element');
                }
              })
        },
        confirmOrder(){
          stripe.confirmPayment({
            elements: this.elements,
            confirmParams: {
              return_url: 'http://localhost:8000/',
            },
          }).then(({ error }) => {
            if (error) {
              if (error.type === 'card_error' || error.type === 'validation_error') {
                console.log(error.message);
              } else {
                console.log('An unexpected error occurred.');
              }
            }
          })
          .catch((err) => {
            console.log('A critical connection error occurred.');
            console.error(err);
          });
        },
        readableKey(key) {
          const words = key.split('_')

          return words.join(' ')
        },
      }"
        x-init="$watch('cart', value => calculateTotal());"
      >
        <h1>Cart</h1>
        <template x-for="cartItem in cart" :key="cartItem.id">
          <ul>
            <li x-text="`Title: ${cartItem.title}`"></li>
            <li x-text="`Price (in cents): ${cartItem.price_cents}`"></li>
            <li x-text="`Quantity: ${cartItem.quantity}`"></li>
            <li
              x-text="`Item total (in cents): ${cartItem.quantity * cartItem.price_cents}`"
            ></li>
            <button
              @click="cart = cart.filter(item => item.id !== cartItem.id)"
            >
              Remove
            </button>
          </ul>
        </template>
        <h2>Subtotal (in cents):</h2>
        <p x-text="subtotal"></p>
        <h2>Tax:</h2>
        <p x-text="tax"></p>
        <h2>Total:</h2>
        <p x-text="total"></p>
        <ul>
          <template
            x-for="[key, value] in Object.entries(orderErrs)"
            :key="key"
          >
            <li>
              <strong
                x-text="`${readableKey(key)}: `"
                style="text-transform: capitalize"
              ></strong>

              <template x-if="typeof value === 'string'">
                <span x-text="value"></span>
              </template>

              <template
                x-if="typeof value === 'object' && value !== null && !Array.isArray(value)"
              >
                <template
                  x-for="[nestedKey, nestedValue] in Object.entries(value)"
                  :key="nestedKey"
                  ><div>
                    <span
                      x-text="`${readableKey(nestedKey)}: `"
                      style="text-transform: capitalize"
                    ></span>
                    <span x-text="nestedValue[0]"></span></div
                ></template>
              </template>

              <template x-if="Array.isArray(value)">
                <template
                  x-for="[nestedKey, nestedValue] in Object.entries(value[0])"
                  :key="nestedKey"
                  ><div>
                    <span
                      x-text="`${readableKey(nestedKey)}: `"
                      style="text-transform: capitalize"
                    ></span>
                    <span x-text="nestedValue[0]"></span></div
                ></template>
              </template>
            </li>
          </template>
        </ul>
        <form @submit="placeOrder">
          <label for="email-input" style="text-transform: capitalize"
            >contact email</label
          >
          <input type="text" x-model="contact_email" id="email-input" />
          <template x-if="placeOrderStatus >= 200 && placeOrderStatus <= 204">
            <p>Order placed successfully</p>
          </template>
          <button type="submit">Place Order</button>
        </form>
        <form
          @submit="confirmOrder"
          id="payment-form"
          x-show="placeOrderStatus >= 200 && placeOrderStatus <= 204"
        >
          <div id="payment-element">
            <!-- Stripe.js injects the Payment Element -->
          </div>
          <button id="submit" type="submit">
            <div class="spinner hidden" id="spinner"></div>
            <span id="button-text">Pay now</span>
          </button>
          <div id="payment-message" class="hidden"></div>
        </form>
      </section>
    </main>
  </body>
  <script src="//unpkg.com/alpinejs" defer></script>
  <script src="https://js.stripe.com/dahlia/stripe.js"></script>
</html>
