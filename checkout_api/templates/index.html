<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microservices</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: "Open Sans", sans-serif;
        /* border: 2px solid brown; */
      }

      main {
        width: 80%;
        margin: 10rem auto;
        display: flex;
      }

      h1,
      h2,
      h3 {
        font-weight: 600;
      }

      h1 {
        text-transform: uppercase;
        margin-bottom: 5rem;
      }

      h2 {
        margin-bottom: 2rem;
      }

      h3 {
        margin-bottom: 1rem;
      }

      section {
        margin-bottom: 5rem;
      }

      section:nth-of-type(1) {
        flex: 2;
        margin-right: 1rem;
      }
      section:nth-of-type(2) {
        flex: 1;
      }

      ul {
        margin-bottom: 1rem;
      }

      button {
        display: block;
        font-size: 1rem;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
      }

      label {
        display: inline-block;
        margin-bottom: 0.2rem;
      }

      input {
        width: 300px;
        display: block;
        border-radius: 0.5rem;
        padding: 0.5rem;
        border: 2px solid #5c6cf8;
      }

      p {
        margin-bottom: 1rem;
      }

      body {
        padding-bottom: 10rem;
        background-color: #f6f6f6;
      }

      .inline-btn {
        display: inline-block;
      }

      .product-list {
        display: flex;
        flex-wrap: wrap;
      }
      .product-list > * {
        min-width: 300px;
        margin-right: 1rem;
        margin-bottom: 1rem;
        background-color: #ffffff;
        border-radius: 1rem;
        overflow: hidden;
        /* border: 1px solid #d4d4d4; */
      }
      .card-body {
        padding: 1.5rem;
      }
      .title {
        border-bottom: 3px solid #f6f6f6;
        padding: 1rem 1.5rem;
        letter-spacing: -0.04rem;
        margin: 0;
      }
      .price > p {
        font-size: 4rem;
        line-height: 1;
        margin-bottom: 2rem;
      }
      .stock-qtty {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2rem;
      }
      .stock-qtty > p {
        color: #ff1f1f;
      }
      .stock-qtty .btn-group > button {
        padding: 0.2rem 0.8rem;
        border-radius: 0.5rem;
        background-color: #ffffff;
        border: 3px solid #f6f6f6;
      }
      .stock-qtty span {
        margin: 0 0.5rem;
        min-width: 1.5rem;
        text-align: center;
        display: inline-block;
      }
      .add-to-cart-btn,
      .remove-from-cart-btn {
        width: 100%;
        padding: 0.7rem 1.5rem;
        border-radius: 0.5rem;
        letter-spacing: -0.04rem;
        font-weight: 600;
      }

      .add-to-cart-btn {
        background-color: #f8f55c;
      }
      .remove-from-cart-btn {
        background-color: #f85c5c;
        color: #ffffff;
      }

      .cart-item {
        width: 300px;
        margin-right: 1rem;
        margin-bottom: 1rem;
        background-color: #ffffff;
        border-radius: 1rem;
        padding: 1.5rem;
        overflow: hidden;
      }

      .place-order {
        background-color: #5c6cf8;
        color: #ffffff;
        width: 300px;
        padding: 0.7rem 1.5rem;
        margin-top: 1rem;
        border-radius: 0.5rem;
        letter-spacing: -0.04rem;
        font-weight: 600;
      }

      .totals {
        margin-bottom: 3rem;
      }

      .totals > h2 {
        margin-bottom: 0.5rem;
      }

      .totals > p {
        font-size: 3rem;
        line-height: 1;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main
      x-data="{ products: [], cart: [], }"
      x-init="products = await (await fetch('/api/checkout/demo-products/')).json()"
    >
      <section>
        <h1>Product Order</h1>
        <div class="product-list">
          <template x-for="product in products" :key="product.id">
            <div
              x-data="{
              quantity: 1,
              get inCart() {
                return cart.some(item => item.id === this.product.id);
              },
              addToCart(product) {
                if(this.inCart) {
                  cart = cart.filter(item => item.id !== product.id)
                } else {
                  cart.push({...product, quantity: this.quantity})
                }
              }
            }"
            >
              <h3 class="title" x-text="`${product.title}`"></h3>
              <div class="card-body">
                <div class="price">
                  <span>For </span>
                  <p x-text="`$${(product.price_cents / 100).toFixed(2)}`"></p>
                </div>
                <div class="stock-qtty">
                  <div class="qtty">
                    <p x-text="`Quantity`"></p>
                    <div class="btn-group">
                      <button
                        @click="quantity < product.stock ? quantity += 1: null"
                        class="inline-btn"
                      >
                        <i class="ri-add-line"></i>
                      </button>
                      <span x-text="`${quantity}`"></span>
                      <button
                        @click="quantity > 1 ? quantity -= 1: null"
                        class="inline-btn"
                      >
                        <i class="ri-subtract-line"></i>
                      </button>
                    </div>
                  </div>
                  <p><em x-text="`${product.stock} in stock`"></em></p>
                </div>
                <button
                  :class="inCart? 'remove-from-cart-btn': 'add-to-cart-btn'"
                  @click="addToCart(product)"
                  x-text="inCart ? 'Remove from Cart' : 'Add to Cart'"
                ></button>
              </div>
            </div>
          </template>
        </div>
      </section>
      <section
        x-data="{
        total: 0,
        subtotal: 0,
        tax: 0.1,
        calculateTotal() {
          this.subtotal = cart.map(item => item.price_cents * item.quantity).reduce((a, b) => a + b, 0)

          this.total = this.subtotal * this.tax + this.subtotal
        },
        contact_email: '',
        orderErrs: {},
        placeOrderStatus: 0,
        elements: null,
        paymentErrs: null,
        stripe: null,
        placeOrder(e) {
            e.preventDefault()

            this.orderErrs = {}
            this.placeOrderStatus = 0

            const cart_items = Alpine.raw(cart.map(item => ({product_id: item.id, product_quantity: item.quantity}))) 

            fetch('/api/checkout/place-order/', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({order: {contact_email: this.contact_email}, cart_items: cart_items})
              }).then(res => {
                this.placeOrderStatus = res.status            

                return res.json()
              }).then(res => {
                if (this.placeOrderStatus >= 400) {
                  this.orderErrs = res
                } else {
                  const stripe = new Stripe('{{stripe_publishable_key}}')
                  this.stripe = stripe

                  const appearance = {
                      theme: 'stripe',
                  };
                  this.elements = stripe.elements({ appearance, clientSecret: res.clientSecret });

                  const paymentElementOptions = {
                    layout: 'accordion',
                  };

                  const paymentElement = this.elements.create('payment', paymentElementOptions);
                  paymentElement.mount('#payment-element');
                }
              })
        },
        confirmOrderStatus: 0,
        confirmOrder(e){
          e.preventDefault()

          this.paymentErrs = null
          this.confirmOrderStatus = 0

          this.stripe.confirmPayment({
              elements: this.elements,
              confirmParams: {
                return_url: 'http://localhost:8000/payment',
              },
            }).then(({ error }) => {
              if (error) {
                if (error.type === 'card_error' || error.type === 'validation_error') {
                  this.paymentErrs = error.message;
                  this.confirmOrderStatus = 400
                } else {
                  this.paymentErrs = 'An unexpected error occurred.';
                  this.confirmOrderStatus = 500
                }
              } else {
                this.confirmOrderStatus = 200
              }
            })
            .catch((err) => {
              this.paymentErrs = 'A critical connection error occurred.';
              this.confirmOrderStatus = 500
            });
        },
        readableKey(key) {
          const words = key.split('_')

          return words.join(' ')
        },
      }"
        x-init="$watch('cart', value => calculateTotal());"
      >
        <h1>Cart</h1>
        <template x-for="cartItem in cart" :key="cartItem.id">
          <div class="cart-item">
            <h3 x-text="cartItem.title"></h3>
            <p
              x-text="`$${(cartItem.price_cents / 100).toFixed(2)} x ${cartItem.quantity}`"
            ></p>
            <p>
              <span>Item total - </span
              ><span
                x-text="`$${(cartItem.quantity * cartItem.price_cents / 100).toFixed(2)}`"
              ></span>
            </p>
            <button
              class="remove-from-cart-btn"
              @click="cart = cart.filter(item => item.id !== cartItem.id)"
            >
              Remove
            </button>
          </div>
        </template>
        <div class="totals">
          <h2>Subtotal</h2>
          <p x-text="`$${(subtotal / 100).toFixed(2)}`"></p>
          <h2>Tax</h2>
          <p x-text="`${tax * 100}%`"></p>
          <h2>Total</h2>
          <p x-text="`$${(total / 100).toFixed(2)}`"></p>
        </div>
        <div>
          <template
            x-for="[key, value] in Object.entries(orderErrs)"
            :key="key"
          >
            <div class="error-msg">
              <template x-if="typeof value === 'string'">
                <span x-text="value"></span>
              </template>

              <template
                x-if="typeof value === 'object' && value !== null && !Array.isArray(value)"
              >
                <template
                  x-for="[nestedKey, nestedValue] in Object.entries(value)"
                  :key="nestedKey"
                  ><div>
                    <span
                      x-text="`${readableKey(nestedKey)}: `"
                      style="text-transform: capitalize"
                    ></span>
                    <span x-text="nestedValue[0]"></span></div
                ></template>
              </template>
            </div>
          </template>
        </div>
        <form @submit="placeOrder">
          <label for="email-input" style="text-transform: capitalize"
            >contact email</label
          >
          <input type="text" x-model="contact_email" id="email-input" />
          <template x-if="placeOrderStatus >= 200 && placeOrderStatus <= 204">
            <p>Order placed successfully</p>
          </template>
          <button type="submit" class="place-order">Place Order</button>
        </form>
        <form
          @submit="confirmOrder"
          x-show="placeOrderStatus >= 200 && placeOrderStatus <= 204"
        >
          <div id="payment-element">
            <!-- Stripe.js injects the Payment Element -->
          </div>
          <button type="submit">Pay now</button>
          <p x-text="paymentErrs"></p>
          <template
            x-if="confirmOrderStatus >= 200 && confirmOrderStatus <= 204"
          >
            <p>Order paid for successfully</p>
          </template>
        </form>
      </section>
    </main>
  </body>
  <script src="//unpkg.com/alpinejs" defer></script>
  <script src="https://js.stripe.com/dahlia/stripe.js"></script>
</html>
